# fly.toml app configuration file generated for amis-api on 2026-05-03T17:48:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'amis-api'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
